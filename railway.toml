# Railway — config as code
# https://docs.railway.com/deploy/config-as-code
#
# Le proxy Railway envoie le trafic vers le port défini par la variable d’environnement PORT.
# Cette commande est un filet de sécurité si l’image ne respecte pas déjà PORT (Dockerfile aligné).

[deploy]
# Obligatoire : exécuter via sh pour que ${PORT} soit développée. Sinon Laravel reçoit la chaîne littérale « $PORT »
# et ServeCommand plante (Unsupported operand types: string + int).
startCommand = "/bin/sh -c 'exec php artisan serve --host=0.0.0.0 --port ${PORT:-8000}'"
